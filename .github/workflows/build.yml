name: Build MSI

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install WiX
        run: dotnet tool install --global wix --version 6.0.2

      - name: Add WiX HTTP extension
        run: wix extension add WixToolset.Http.wixext/6.0.2

      - name: Build solution
        run: |
          $msbuild = "C:\Windows\Microsoft.NET\Framework64\v4.0.30319\MSBuild.exe"
          $extDll = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "Extensibility.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $extDll) {
            $extDll = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "Extensibility.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if (-not $extDll) { Write-Error "Extensibility.dll not found"; exit 1 }
          Write-Host "Found: $($extDll.FullName)"
          New-Item -ItemType Directory -Force C:\refs | Out-Null
          Copy-Item $extDll.FullName C:\refs\
          & $msbuild NcTalkOutlookAddIn.sln /m /t:Rebuild /p:Configuration=Release /p:ReferencePath=C:\refs
        shell: pwsh

      - name: Read assembly version
        id: version
        run: |
          $dll = "src\NcTalkOutlookAddIn\bin\Release\NcTalkOutlookAddIn.dll"
          $v = [System.Reflection.AssemblyName]::GetAssemblyName($dll).Version
          echo "full=$v" >> $env:GITHUB_OUTPUT
          # MSI ProductVersion only supports 3 numeric fields, so every fork patch
          # (major.minor.patch.forkPatch) would otherwise collapse to the same
          # "major.minor.patch" string in Add/Remove Programs. Fold the fork patch
          # into the build field (patch*100 + forkPatch) so each release stays
          # distinguishable and version comparisons remain monotonically ordered.
          $displayBuild = $v.Build * 100 + $v.Revision
          echo "short=$($v.Major).$($v.Minor).$displayBuild" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build MSI
        run: |
          $buildOutput = "src\NcTalkOutlookAddIn\bin\Release\"
          dotnet build installer\NcConnectorOutlookInstaller.wixproj `
            -c Release `
            /p:BuildOutputDir="$((Resolve-Path $buildOutput).Path)\" `
            /p:ProductVersion=${{ steps.version.outputs.short }} `
            /p:AssemblyVersion=${{ steps.version.outputs.full }} `
            /p:SuppressValidation=true
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: NCConnectorForOutlook-${{ steps.version.outputs.short }}
          path: installer\bin\Release\NCConnectorForOutlook.msi
